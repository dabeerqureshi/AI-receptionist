name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest flake8 black pytest-asyncio

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check formatting with black
      run: |
        black --check .

    - name: Run tests
      run: |
        pytest -v

    - name: Verify server starts
      run: |
        Start-Process uvicorn -ArgumentList "main:app --host 127.0.0.1 --port 8000"
        Start-Sleep -Seconds 10
        $response = Invoke-WebRequest -Uri http://localhost:8000 -UseBasicParsing
        if ($response.StatusCode -ne 200) { exit 1 }
        echo "API server started successfully"