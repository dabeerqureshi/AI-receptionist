name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - uses: actions/checkout@v4
      name: Checkout repository code

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Verify application imports
      run: |
        python -c "import main; import services; print('✅ All modules imported successfully')"

    - name: Check FastAPI application health
      run: |
        python -c "
        from main import app
        assert app is not None
        print('✅ FastAPI application initialized correctly')
        "

    - name: Run tests
      run: |
        if [ -d "tests" ]; then
          pytest tests/ -v
        else
          echo "⚠️ No tests directory found, skipping test run"
        fi